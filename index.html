<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adveya's Childhood Memories 🧸</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Indie+Flower&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --color-primary: #FF9E9E;
            --color-secondary: #A0E7E5;
            --color-accent: #FFFD8C;
            --color-bg: #FFF5F5;
            --color-text: #5E5E5E;
        }
        
        body {
            font-family: 'Comic Neue', cursive;
            background-color: var(--color-bg);
            margin: 0;
            padding: 0;
            color: var(--color-text);
            background-image: url('data:image/svg+xml;utf8,<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="3" fill="%23FF9E9E" opacity="0.5"/><circle cx="50" cy="50" r="4" fill="%23A0E7E5" opacity="0.5"/><circle cx="80" cy="30" r="2" fill="%23FFFD8C" opacity="0.5"/></svg>');
            background-size: 100px;
        }
        
        .container {
            max-width: 700px;
            margin: 30px auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 5px dashed var(--color-primary);
            position: relative;
            overflow: hidden;
        }
        
        .container::before {
            content: "👶";
            position: absolute;
            top: -15px;
            right: -15px;
            font-size: 80px;
            opacity: 0.1;
            z-index: 0;
        }
        
        h1 {
            font-family: 'Indie Flower', cursive;
            font-size: 3rem;
            color: var(--color-primary);
            text-align: center;
            margin: 0 0 10px;
            text-shadow: 3px 3px 0px rgba(0, 0, 0, 0.1);
        }
        
        .subtitle {
            text-align: center;
            font-size: 1.2rem;
            color: var(--color-secondary);
            margin-bottom: 30px;
        }
        
        .memory-box {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 90%;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border-radius: 15px;
            border: 3px solid var(--color-accent);
            position: relative;
        }
        
        .memory-box::after {
            content: "";
            position: absolute;
            bottom: -15px;
            left: 20px;
            right: 20px;
            height: 15px;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 20" xmlns="http://www.w3.org/2000/svg"><path d="M0,10 C30,20 70,0 100,10 L100,20 L0,20 Z" fill="%23FFFD8C"/></svg>');
            background-size: 100% 100%;
        }
        
        .input-group {
            margin: 30px 0;
            text-align: center;
        }
        
        input {
            width: 70%;
            padding: 12px;
            border: 3px dotted var(--color-secondary);
            border-radius: 50px;
            font-size: 1.1rem;
            text-align: center;
            font-family: 'Comic Neue', cursive;
            margin-bottom: 15px;
            background-color: #FFF9F9;
        }
        
        button {
            background: var(--color-primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            font-family: 'Comic Neue', cursive;
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.1);
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 rgba(0, 0, 0, 0.1);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button::after {
            content: "🎈";
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .prank-message {
            text-align: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--color-primary);
            margin: 20px 0;
            padding: 15px;
            background: var(--color-accent);
            border-radius: 10px;
            display: none;
            animation: bounce 0.5s;
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .video-container {
            margin: 30px auto;
            display: none;
            position: relative;
            padding-bottom: 56.25%;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            border: 5px solid white;
        }
        
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .fools-list {
            margin: 30px 0;
            display: none;
            text-align: center;
        }
        
        .fools-list h3 {
            font-family: 'Indie Flower', cursive;
            color: var(--color-secondary);
            font-size: 1.8rem;
            margin-bottom: 15px;
        }
        
        .fool-badge {
            display: inline-block;
            background: var(--color-accent);
            padding: 8px 15px;
            border-radius: 50px;
            margin: 5px;
            font-weight: bold;
            box-shadow: 0 3px 0 rgba(0, 0, 0, 0.1);
            position: relative;
        }
        
        .fool-badge::before {
            content: "😆";
            position: absolute;
            left: -10px;
            top: -10px;
            font-size: 12px;
        }
        
        .admin-panel {
            margin-top: 30px;
            padding: 20px;
            background: #f0f0f0;
            border-radius: 10px;
            display: none;
        }
        
        .admin-panel h3 {
            color: var(--color-primary);
            text-align: center;
        }
        
        .viewers-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }
        
        .viewers-table th, .viewers-table td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: left;
        }
        
        .viewers-table th {
            background: var(--color-secondary);
            color: white;
        }
        
        .export-btn {
            background: #4CAF50;
            margin-top: 15px;
        }
        
        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 100;
        }
        
        .music-control::after {
            content: "🎵";
            font-size: 24px;
        }
        
        .music-control.muted::after {
            content: "🔇";
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
                margin: 15px;
            }
            
            h1 {
                font-size: 2.2rem;
            }
            
            input {
                width: 90%;
            }
        }
    </style>
</head>
<body>
    <!-- Background music (auto plays but muted by default) -->
    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        <!-- You can replace with any childhood-style music -->
    </audio>
    
    <div class="music-control" id="musicControl"></div>
    
    <div class="container">
        <h1>Adveya's Childhood Memories</h1>
        <p class="subtitle">A magical journey back in time ✨</p>
        
        <div class="memory-box">
            <div style="text-align: center; font-size: 3rem;">🧸</div>
            <p style="text-align: center;">These precious memories are waiting for you!</p>
        </div>
        
        <div class="input-group">
            <input type="text" id="userName" placeholder="Who's watching? Enter your name!">
            <button onclick="verifyIdentity()">See Memories</button>
        </div>
        
        <div class="prank-message" id="prankMessage">
            APRIL FOOLS, <span id="victimName"></span>! 😂
        </div>
        
        <div class="video-container" id="videoContainer"></div>
        
        <div class="fools-list" id="foolsList">
            <h3>Recent Visitors</h3>
            <div id="foolsContainer"></div>
        </div>
        
        <div class="admin-panel" id="adminPanel">
            <h3>Admin Panel</h3>
            <table class="viewers-table" id="viewersTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>IP</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody id="viewersTableBody"></tbody>
            </table>
            <button class="export-btn" onclick="exportToExcel()">Export to Excel</button>
        </div>
    </div>

    <script>
        let viewers = [];
        const bgMusic = document.getElementById('bgMusic');
        const musicControl = document.getElementById('musicControl');
        
        // Start music quietly (muted by default)
        bgMusic.volume = 0.2;
        bgMusic.play().catch(e => console.log("Auto-play prevented"));
        
        // Music toggle control
        musicControl.addEventListener('click', () => {
            if (bgMusic.paused) {
                bgMusic.play();
                musicControl.classList.remove('muted');
            } else {
                bgMusic.pause();
                musicControl.classList.add('muted');
            }
        });
        
        // Get IP address
        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip || 'Unknown';
            } catch {
                return 'Unknown';
            }
        }
        
        // Show last 10 fools
        function showRecentFools() {
            const container = document.getElementById('foolsContainer');
            container.innerHTML = '';
            
            const recentFools = viewers.slice(-10).reverse();
            
            recentFools.forEach(fool => {
                const badge = document.createElement('div');
                badge.className = 'fool-badge';
                badge.textContent = fool.name;
                container.appendChild(badge);
            });
            
            document.getElementById('foolsList').style.display = 'block';
        }
        
        // Main function
        async function verifyIdentity() {
            const name = document.getElementById('userName').value.trim();
            if (!name) return;
            
            const ip = await getIP();
            const time = new Date().toLocaleString();
            
            viewers.push({ name, ip, time });
            showRecentFools();
            
            document.getElementById('victimName').textContent = name;
            document.getElementById('prankMessage').style.display = 'block';
            
            // Show video after delay
            setTimeout(() => {
                document.getElementById('videoContainer').style.display = 'block';
                document.getElementById('videoContainer').innerHTML = `
                    <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1" 
                    frameborder="0" allowfullscreen></iframe>
                `;
            }, 1000);
            
            // Show admin tools if name is "admin"
            if (name.toLowerCase() === 'admin') {
                document.getElementById('adminPanel').style.display = 'block';
                updateViewersTable();
            }
        }
        
        // Update the viewers table
        function updateViewersTable() {
            const tbody = document.getElementById('viewersTableBody');
            tbody.innerHTML = '';
            
            viewers.slice().reverse().forEach(viewer => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${viewer.name}</td>
                    <td>${viewer.ip}</td>
                    <td>${viewer.time}</td>
                `;
                tbody.appendChild(row);
            });
        }
        
        // Export to Excel
        function exportToExcel() {
            const data = [
                ['Name', 'IP Address', 'Timestamp'],
                ...viewers.map(v => [v.name, v.ip, v.time])
            ];
            
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(data);
            XLSX.utils.book_append_sheet(wb, ws, "Viewers");
            XLSX.writeFile(wb, "Adveya_Viewers.xlsx");
        }
    </script>
</body>
</html>
